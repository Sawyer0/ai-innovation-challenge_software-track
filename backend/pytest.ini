[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Display options
addopts = 
    -v
    --tb=short
    --strict-markers
    --ignore=venv
    --ignore=__pycache__

# Coverage (enable with: pytest --cov=app)
# addopts = --cov=app --cov-report=term-missing --cov-report=html:htmlcov

# Test markers - register here to avoid warnings
markers =
    slow: marks tests as slow (E2E tests, >1 second)
    unit: marks tests as unit tests (fast, <100ms)
    integration: marks tests as integration tests (medium speed)
    data_quality: marks tests that validate catalog data
    e2e: marks end-to-end tests

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
